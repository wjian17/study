# 服务端口号
server:
  port: 8761

#Eureka 相关配置
eureka:
  instance:
    prefer-ip-address: true
    #lease-renewal-interval-in-seconds: 5    #向服务端发送一次心跳，证明自己依然”存活“
    #lease-expiration-duration-in-seconds: 20     #如果我2s之内没有给你发心跳，就代表我“死”了，将我踢出掉
    hostname: ${spring.cloud.client.ip-address}
    instance-id: ${spring.cloud.client.ip-address}:${spring.application.name}:${server.port}:${project.version}
  # 关闭自我保护，及时剔除无用服务
  # 测试时关闭自我保护机制，保证不可用服务及时踢出
  server:
    enableSelfPreservation: true
  client:
    service-url:
      #3个Eureka Server时，以此类推，三个Server相互配置另外2个地址，Client 配置 3个地址
      defaultZone: http://${spring.security.user.name}:${spring.security.user.password}@${eureka.instance.hostname}:8760/eureka/
    # 是否从其他的服务中心同步服务列表
    fetch-registry: true
    # 是否把自己作为服务注册到其他服务注册中心
    register-with-eureka: true

spring:
  application:
    name: study-eureka
  security:
    user:
      name: admin # 用户密码
      password: admin