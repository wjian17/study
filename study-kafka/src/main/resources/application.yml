# 服务端口号
server:
  port: 8764
  servlet:
    context-path: /${spring.application.name}

#client 相关配置
eureka:
  instance:
    lease-renewal-interval-in-seconds: 30    #向服务端发送一次心跳，证明自己依然”存活“
    lease-expiration-duration-in-seconds: 2000     #如果我2s之内没有给你发心跳，就代表我“死”了，将我踢出掉
    hostname: localhost
    instance-id: ${spring.cloud.client.ip-address}:${spring.application.name}:${server.port}:@project.version@
  # 关闭自我保护，及时剔除无用服务
  # 测试时关闭自我保护机制，保证不可用服务及时踢出
  server:
    enableSelfPreservation: true
  client:
    service-url:
      defaultZone: http://${spring.security.user.name}:${spring.security.user.password}@${eureka.instance.hostname}:8761/eureka/
    # 是否从其他的服务中心同步服务列表
    fetch-registry: true
    # 是否把自己作为服务注册到其他服务注册中心
    register-with-eureka: true

feign:
  hystrix:
    enabled: true

spring:
  log-home: /study-log/logs/${spring.application.name}
  application:
    name: study-kafka
  security:
    user:
      name: admin # 用户密码
      password: admin
  jpa:
    show-sql: true
  datasource:
    hikari:
      maxLifetime: 1765000 #一个连接的生命时长（毫秒），超时而且没被使用则被释放（retired），缺省:30分钟，建议设置比数据库超时时长少30秒以上
      maximumPoolSize: 15
      #连接池中允许的最大连接数。缺省值：10；推荐的公式：((core_count * 2) + effective_spindle_count)
      idleTimeout: 600000
        #connectionTimeout: 30000 #等待来自池的连接的最大毫秒数。如果在没有可用连接的情况下超过此时间，则会抛出SQLException。最低可接受的连接超时时间为250 ms。 默认值：30000（30秒）
        #允许连接在池中闲置的最长时间。 此设置仅适用于minimumIdle定义为小于maximumPoolSize。一旦池达到连接，空闲连接将不会退出minimumIdle。连接是否因闲置而退出，最大变化量为+30秒
        #平均变化量为+15秒。在超时之前，连接永远不会退出。值为0意味着空闲连接永远不会从池中删除。允许的最小值是10000ms（10秒）。 默认值：600000（10分钟）
        #自动提交行为。它是一个布尔值。 默认值：true
        #autoCommit: true
      master:
        url: jdbc:mysql://localhost:3306/zxyh?characterEncoding=utf8&useSSL=true&serverTimezone=UTC
        username: root
        password: root
        driverClassName: com.mysql.cj.jdbc.Driver
      salver:
        url: jdbc:mysql://localhost:3306/zxyh?characterEncoding=utf8&useSSL=true&serverTimezone=UTC
        username: root
        password: root
        driverClassName: com.mysql.cj.jdbc.Driver
    stream:
      bindings:
        #配置自己定义的通道与哪个中间件交互
        shop_input: #channel里Input和Output的值
          destination: topict1    #消息接收目標
          group: group #組名
          consumer:
            partitioned: true   #开启分区
        shop_output:
          destination: topict1    #消息发往的目的地
          content-type: text/plain    #消息发送的格式，接收端不用指定格式，但是发送端要
          producer:
            partitionKeyExpression: payload.id   #分区的主键，根据什么来分区，下面的payload.id只是一个对象的id用于做为Key，用来说明的。希望不要误解
            partitionCount: 2    #Key和分区数量进行取模去分配消息，这里分区数量配置为2
      kafka:
        binder:
          brokers: 192.168.199.130:9092,192.168.199.130:9093,192.168.199.130:9094  # kafka服务地址和端口
          autoCreateTopics: true
          autoAddPartitions: true
#          requiredAcks: all
#          minPatitionCount: 1
          zk-nodes: 192.168.199.130:2181,192.168.199.130:2182,192.168.199.130:2183  # ZK的集群配置地址和端口
  #      bootstrap-servers: 192.168.199.130:9092,192.168.199.130:9093,192.168.199.130:9094
  #        producer:
  #          retries: 0
  #          batch-size: 16384
  #          buffer-memory: 33554432
  #          key-serializer: org.apache.kafka.common.serialization.StringSerializer
  #          value-serializer: org.apache.kafka.common.serialization.StringSerializer
  #        consumer:
  #          group-id: ideal-consumer-group
  #          auto-offset-reset: earliest
  #          enable-auto-commit: true
  #        auto-commit-interval: 20000
  #        key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  #        value-deserializer: org.apache.kafka.common.serialization.StringDeserializer


mybatis:
  typeAliasesPackage: com.company.forward.domain.rest.*
  mapperLocations: classpath*:mapper/**.xml
  configuration: mybatis-config.xml